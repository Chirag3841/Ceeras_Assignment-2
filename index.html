<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Assessment Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>Health Assessment Portal</h1>
            <p class="subtitle">Get personalized health advice based on your vitals</p>
        </div>
    </header>
    
    <main class="container">
        <section class="form-section" id="formSection">
            <h2 class="section-title">Enter Your Health Information</h2>
            <form id="healthForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" required>
                    </div>
                    <div class="form-group">
                        <label for="age">Age</label>
                        <input type="number" id="age" required min="1" max="120">
                    </div>
                    <div class="form-group">
                        <label for="gender">Gender</label>
                        <select id="gender" required>
                            <option value="">Select Gender</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="dob">Date of Birth</label>
                        <input type="date" id="dob" required>
                    </div>
                    <div class="form-group">
                        <label for="fatherName">Father's Name</label>
                        <input type="text" id="fatherName" required>
                    </div>
                    <div class="form-group">
                        <label for="bloodPressure">Blood Pressure (mmHg)</label>
                        <input type="number" id="bloodPressure" step="0.1" required>
                    </div>
                    <div class="form-group">
                        <label for="sugarLevel">Sugar Level (mg/dL)</label>
                        <input type="number" id="sugarLevel" step="0.1" required>
                    </div>
                    <div class="form-group">
                        <label for="bmi">BMI (kg/m²)</label>
                        <input type="number" id="bmi" step="0.1" required>
                    </div>
                </div>
                <button type="submit">Submit Health Data</button>
            </form>
        </section>
        
        <section class="results-section hidden" id="resultsSection">
            <h2 class="section-title">Your Health Assessment</h2>
            <div id="resultsContainer"></div>
            <button id="backButton">Assess Another Person</button>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
